<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page introuvable · Nexploria</title>
<meta name="robots" content="noindex">
<link rel="canonical" href="https://nexploria.science/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f2ed;--ink:#111010;--muted:#7a776f;--red:#d63f0e;--border:#d6d2c8}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'IBM Plex Mono',monospace;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center}
canvas{position:fixed;inset:0;width:100%;height:100%;opacity:0.08;pointer-events:none;z-index:0}
.content{position:relative;z-index:1;max-width:500px}
.code{font-size:clamp(4rem,15vw,8rem);font-family:'Syne',sans-serif;font-weight:800;line-height:1;letter-spacing:-0.05em;color:var(--ink);margin-bottom:1rem}
.code span{color:var(--red)}
h1{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;letter-spacing:-0.02em;margin-bottom:0.75rem}
p{font-size:0.82rem;color:var(--muted);line-height:1.7;margin-bottom:2rem}
.links{display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:0.6rem 1.25rem;font-family:'IBM Plex Mono',monospace;font-size:0.72rem;letter-spacing:0.05em;text-transform:uppercase;text-decoration:none;border-radius:3px;transition:background 0.15s,transform 0.12s}
.btn-primary{background:var(--ink);color:var(--bg);border:1px solid var(--ink)}
.btn-primary:hover{background:var(--red);border-color:var(--red);transform:translateY(-2px)}
.btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--border)}
.btn-ghost:hover{background:#e8e5de;transform:translateY(-2px)}
.suggest{margin-top:2.5rem;padding-top:2rem;border-top:1px solid var(--border)}
.suggest-label{font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem}
.suggest-grid{display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap}
.suggest-chip{padding:0.3rem 0.75rem;border:1px solid var(--border);border-radius:100px;font-size:0.7rem;text-decoration:none;color:var(--muted);transition:color 0.15s,border-color 0.15s}
.suggest-chip:hover{color:var(--red);border-color:var(--red)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="content">
  <div class="code">4<span>0</span>4</div>
  <h1>Cette page est introuvable.</h1>
  <p>L'expérience que vous cherchez n'existe peut-être pas encore, ou son adresse a changé. Revenez à l'accueil pour explorer les 14 simulations disponibles.</p>
  <div class="links">
    <a href="/" class="btn btn-primary">Retour à l'accueil →</a>
    <a href="/#experiences" class="btn btn-ghost">Voir les expériences</a>
  </div>
  <div class="suggest">
    <div class="suggest-label">Suggestions</div>
    <div class="suggest-grid">
      <a href="/experience/mandelbrot" class="suggest-chip">Mandelbrot</a>
      <a href="/experience/lorenz" class="suggest-chip">Lorenz</a>
      <a href="/experience/conway" class="suggest-chip">Conway</a>
      <a href="/experience/turing" class="suggest-chip">Turing</a>
      <a href="/experience/fourier" class="suggest-chip">Fourier</a>
    </div>
  </div>
</div>
<script>
// Same hero particle animation as main site
const c=document.getElementById('c'),g=c.getContext('2d');
let pts=[];
const resize=()=>{c.width=innerWidth;c.height=innerHeight};
resize();window.addEventListener('resize',resize);
for(let i=0;i<60;i++)pts.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4});
(function draw(){
  g.clearRect(0,0,c.width,c.height);
  pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>c.width)p.vx*=-1;if(p.y<0||p.y>c.height)p.vy*=-1;});
  pts.forEach((a,i)=>{pts.slice(i+1).forEach(b=>{const d=Math.hypot(a.x-b.x,a.y-b.y);if(d<100){g.strokeStyle=`rgba(17,16,16,${(1-d/100)*.3})`;g.lineWidth=.5;g.beginPath();g.moveTo(a.x,a.y);g.lineTo(b.x,b.y);g.stroke();}});g.fillStyle='rgba(17,16,16,.4)';g.beginPath();g.arc(a.x,a.y,1.5,0,Math.PI*2);g.fill();});
  requestAnimationFrame(draw);
})();
// If arrived via 404 redirect, save path for router
const path=location.pathname.replace(/^\//,'');
if(path&&path!=='404-page'&&path!=='404'){sessionStorage.setItem('redirect','/'+path);location.replace('/');}
</script>
</body>
</html>
